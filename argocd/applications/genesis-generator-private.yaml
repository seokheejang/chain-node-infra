apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: genesis-generator-private
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/seokheejang/chain-node-infra.git
    targetRevision: main
    path: charts/genesis-generator
    helm:
      valueFiles:
        - ../../environments/private/genesis-generator.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: ethereum-private
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

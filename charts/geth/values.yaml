# -- Number of replicas
replicaCount: 1

image:
  # -- Container image repository
  repository: ethereum/client-go
  # -- Container image tag
  tag: "v1.14.12"
  # -- Image pull policy
  pullPolicy: IfNotPresent

# -- Override the chart name
nameOverride: ""
# -- Override the full resource name
fullnameOverride: ""

serviceAccount:
  # -- Create a ServiceAccount
  create: true
  # -- ServiceAccount name (auto-generated if empty)
  name: ""
  # -- Annotations to add to the ServiceAccount
  annotations: {}

service:
  # -- Service type
  type: ClusterIP
  ports:
    # -- HTTP-RPC port
    rpc: 8545
    # -- WebSocket-RPC port
    ws: 8546
    # -- Engine API (authenticated RPC) port
    authrpc: 8551
    # -- P2P TCP port
    p2pTcp: 30303
    # -- P2P UDP port
    p2pUdp: 30303
    # -- Metrics port
    metrics: 6060

persistence:
  # -- Enable persistent storage for chain data
  enabled: true
  # -- Storage class (empty for default)
  storageClass: ""
  # -- Access modes
  accessModes:
    - ReadWriteOnce
  # -- Volume size (immutable after PVC creation, provision generously)
  # Recommended sizes by network and gcMode:
  #   Mainnet pruned:  600Gi   |  Mainnet archive:  3Ti
  #   Sepolia pruned:  200Gi   |  Sepolia archive:  800Gi
  #   Holesky pruned:  150Gi   |  Holesky archive:  600Gi
  #   Private:          50Gi   |  (any mode)
  # Note: geth v1.14+ with PebbleDB + path scheme significantly reduced pruned storage
  size: 100Gi
  # -- Annotations for the PVC
  annotations: {}

resources:
  requests:
    # -- CPU request
    cpu: "1"
    # -- Memory request
    memory: 4Gi
  limits:
    # -- CPU limit
    cpu: "2"
    # -- Memory limit
    memory: 8Gi

# -- Node selector for pod scheduling
nodeSelector: {}

# -- Tolerations for pod scheduling
tolerations: []

# -- Affinity rules for pod scheduling
affinity: {}

# -- Pod security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

# -- Container security context
securityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false

config:
  # -- Ethereum network (mainnet, sepolia, holesky, private)
  # When set to "private", the --networkid flag is used instead of --<network>
  network: mainnet
  # -- Custom network ID for private networks (e.g., 32382)
  # Only used when config.network is "private"
  networkId: ""
  # -- Sync mode (snap, full, light)
  syncMode: snap
  # -- Garbage collection mode
  # "full" (default): pruned mode with path-based state scheme (smaller disk)
  # "archive": archive mode with hash-based state scheme (full historical state, larger disk)
  gcMode: full
  # -- Data directory inside the container
  dataDir: /data/geth
  # -- Database cache size in MB
  cache: 4096
  # -- Max peer count
  maxPeers: 50
  # -- Bootnode enode URLs for private network peer discovery
  bootnodes: []
  # -- Additional CLI arguments
  extraArgs: []

genesis:
  # -- Enable genesis initialization (geth init)
  enabled: false
  # -- Genesis configuration content (YAML, rendered to JSON)
  config: {}
  # -- Use existing ConfigMap for genesis.json
  existingConfigMap: ""
  # -- Download genesis.json from HTTP URL (e.g., genesis-generator server)
  # When set, an initContainer downloads genesis.json before geth init.
  fromUrl: ""

jwt:
  # -- Enable JWT authentication for Engine API
  enabled: false
  # -- JWT secret (generate with: openssl rand -hex 32)
  secret: ""
  # -- Use existing secret for JWT
  existingSecret: ""

livenessProbe:
  # -- Enable liveness probe
  enabled: true
  # -- Initial delay before probe starts
  initialDelaySeconds: 60
  # -- Probe interval
  periodSeconds: 30
  # -- Probe timeout
  timeoutSeconds: 5
  # -- Failure threshold
  failureThreshold: 3
  httpGet:
    path: /
    port: rpc

readinessProbe:
  # -- Enable readiness probe
  enabled: true
  # -- Initial delay before probe starts
  initialDelaySeconds: 30
  # -- Probe interval
  periodSeconds: 10
  # -- Probe timeout
  timeoutSeconds: 5
  # -- Failure threshold
  failureThreshold: 3
  httpGet:
    path: /
    port: rpc

ingress:
  # -- Ingress type: "none", "ingress", or "httpRoute"
  type: none
  # -- Hostnames for ingress/httpRoute
  # Simple form (routes to RPC port):
  #   hostnames:
  #     - geth-rpc.192.168.1.100.nip.io
  # Structured form (per-port routing, baremetal nip.io convention):
  #   hostnames:
  #     - hostname: geth-rpc.192.168.1.100.nip.io
  #       port: rpc
  #     - hostname: geth-ws.192.168.1.100.nip.io
  #       port: ws
  hostnames: []
  # -- Traditional Kubernetes Ingress configuration
  ingress:
    # -- Ingress class name (e.g., nginx)
    className: ""
    # -- Annotations for Ingress resource
    annotations: {}
    # -- TLS configuration
    tls: []
    #  - secretName: geth-tls
    #    hosts:
    #      - geth-rpc.example.com
  # -- Gateway API HTTPRoute configuration (e.g., Cilium Gateway)
  httpRoute:
    # -- Name of the parent Gateway resource
    gatewayName: ""
    # -- Namespace of the parent Gateway resource
    gatewayNamespace: default
    # -- Path match type (PathPrefix or Exact)
    pathType: PathPrefix
    # -- Path to match
    path: /

metrics:
  # -- Enable Prometheus metrics
  enabled: false
  serviceMonitor:
    # -- Create a ServiceMonitor resource
    enabled: false
    # -- ServiceMonitor scrape interval
    interval: 30s
    # -- Additional labels for the ServiceMonitor
    additionalLabels: {}

{{- if eq .Values.ingress.type "httpRoute" }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "geth.fullname" . }}
  labels:
    {{- include "geth.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.ingress.httpRoute.gatewayName }}
      namespace: {{ .Values.ingress.httpRoute.gatewayNamespace }}
  hostnames:
    {{- range .Values.ingress.hostnames }}
    {{- if kindIs "string" . }}
    - {{ . | quote }}
    {{- else }}
    - {{ .hostname | quote }}
    {{- end }}
    {{- end }}
  rules:
    {{- range .Values.ingress.hostnames }}
    {{- if kindIs "string" . }}
    - matches:
        - path:
            type: {{ $.Values.ingress.httpRoute.pathType }}
            value: {{ $.Values.ingress.httpRoute.path }}
      backendRefs:
        - name: {{ include "geth.fullname" $ }}
          port: {{ $.Values.service.ports.rpc }}
    {{- else }}
    - matches:
        - path:
            type: {{ $.Values.ingress.httpRoute.pathType }}
            value: {{ $.Values.ingress.httpRoute.path }}
      backendRefs:
        - name: {{ include "geth.fullname" $ }}
          port: {{ index $.Values.service.ports .port }}
    {{- end }}
    {{- end }}
{{- end }}

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "geth.fullname" . }}
  labels:
    {{- include "geth.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  serviceName: {{ include "geth.fullname" . }}
  selector:
    matchLabels:
      {{- include "geth.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "geth.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "geth.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.genesis.enabled }}
      initContainers:
        {{- if .Values.genesis.fromUrl }}
        - name: download-genesis
          image: busybox:1.37
          command:
            - sh
            - -c
            - |
              echo "Waiting for genesis-generator..."
              until wget -q --spider {{ .Values.genesis.fromUrl }}; do
                sleep 5
              done
              wget -O /genesis-download/genesis.json {{ .Values.genesis.fromUrl }}
              echo "Genesis downloaded."
          volumeMounts:
            - name: genesis-download
              mountPath: /genesis-download
        {{- end }}
        - name: geth-init
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
          command:
            - sh
            - -c
            - |
              if [ ! -d {{ .Values.config.dataDir }}/geth/chaindata ]; then
                echo "Initializing genesis..."
                {{- if .Values.genesis.fromUrl }}
                geth init --datadir {{ .Values.config.dataDir }} /genesis-download/genesis.json
                {{- else }}
                geth init --datadir {{ .Values.config.dataDir }} /config/genesis.json
                {{- end }}
              else
                echo "Chain data already exists, skipping init."
              fi
          volumeMounts:
            - name: data
              mountPath: {{ .Values.config.dataDir }}
            {{- if .Values.genesis.fromUrl }}
            - name: genesis-download
              mountPath: /genesis-download
              readOnly: true
            {{- else }}
            - name: genesis
              mountPath: /config
              readOnly: true
            {{- end }}
      {{- end }}
      containers:
        - name: geth
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          args:
            {{- if ne .Values.config.network "private" }}
            - --{{ .Values.config.network }}
            {{- else }}
            - --networkid={{ .Values.config.networkId }}
            {{- end }}
            - --syncmode={{ .Values.config.syncMode }}
            - --gcmode={{ .Values.config.gcMode }}
            {{- if eq .Values.config.gcMode "archive" }}
            - --state.scheme=hash
            {{- else }}
            - --state.scheme=path
            {{- end }}
            - --datadir={{ .Values.config.dataDir }}
            - --cache={{ .Values.config.cache }}
            - --maxpeers={{ .Values.config.maxPeers }}
            - --http
            - --http.addr=0.0.0.0
            - --http.port={{ .Values.service.ports.rpc }}
            - --http.vhosts=*
            - --http.api={{ .Values.config.httpApi }}
            {{- if .Values.config.httpCorsDomain }}
            - --http.corsdomain={{ .Values.config.httpCorsDomain }}
            {{- end }}
            - --ws
            - --ws.addr=0.0.0.0
            - --ws.port={{ .Values.service.ports.ws }}
            - --ws.origins=*
            - --ws.api={{ .Values.config.wsApi }}
            {{- if .Values.metrics.enabled }}
            - --metrics
            - --metrics.addr=0.0.0.0
            - --metrics.port={{ .Values.service.ports.metrics }}
            {{- end }}
            {{- if .Values.jwt.enabled }}
            - --authrpc.jwtsecret=/secrets/jwt/jwt.hex
            - --authrpc.addr=0.0.0.0
            - --authrpc.port={{ .Values.service.ports.authrpc }}
            - --authrpc.vhosts=*
            {{- end }}
            {{- if .Values.config.bootnodes }}
            - --bootnodes={{ join "," .Values.config.bootnodes }}
            {{- end }}
            {{- range .Values.config.extraArgs }}
            - {{ . }}
            {{- end }}
          ports:
            - name: rpc
              containerPort: {{ .Values.service.ports.rpc }}
              protocol: TCP
            - name: ws
              containerPort: {{ .Values.service.ports.ws }}
              protocol: TCP
            {{- if .Values.jwt.enabled }}
            - name: authrpc
              containerPort: {{ .Values.service.ports.authrpc }}
              protocol: TCP
            {{- end }}
            - name: p2p-tcp
              containerPort: {{ .Values.service.ports.p2pTcp }}
              protocol: TCP
            - name: p2p-udp
              containerPort: {{ .Values.service.ports.p2pUdp }}
              protocol: UDP
            {{- if .Values.metrics.enabled }}
            - name: metrics
              containerPort: {{ .Values.service.ports.metrics }}
              protocol: TCP
            {{- end }}
          {{- if .Values.livenessProbe.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.livenessProbe.httpGet.path }}
              port: {{ .Values.livenessProbe.httpGet.port }}
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.livenessProbe.failureThreshold }}
          {{- end }}
          {{- if .Values.readinessProbe.enabled }}
          readinessProbe:
            httpGet:
              path: {{ .Values.readinessProbe.httpGet.path }}
              port: {{ .Values.readinessProbe.httpGet.port }}
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.readinessProbe.failureThreshold }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.config.dataDir }}
            {{- if .Values.jwt.enabled }}
            - name: jwt
              mountPath: /secrets/jwt
              readOnly: true
            {{- end }}
      {{- if or .Values.jwt.enabled .Values.genesis.enabled }}
      volumes:
        {{- if .Values.jwt.enabled }}
        - name: jwt
          secret:
            {{- if .Values.jwt.existingSecret }}
            secretName: {{ .Values.jwt.existingSecret }}
            {{- else }}
            secretName: {{ include "geth.fullname" . }}-jwt
            {{- end }}
        {{- end }}
        {{- if .Values.genesis.enabled }}
        {{- if .Values.genesis.fromUrl }}
        - name: genesis-download
          emptyDir: {}
        {{- else }}
        - name: genesis
          configMap:
            {{- if .Values.genesis.existingConfigMap }}
            name: {{ .Values.genesis.existingConfigMap }}
            {{- else }}
            name: {{ include "geth.fullname" . }}-genesis
            {{- end }}
        {{- end }}
        {{- end }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- if .Values.persistence.enabled }}
  volumeClaimTemplates:
    # apiVersion/kind 명시 — k8s API 가 apply 시 이 값들을 자동 채우므로
    # template 에도 박아두어 GitOps tool (ArgoCD/FluxCD) 의 drift detection 예방.
    - apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: data
        {{- with .Values.persistence.annotations }}
        annotations:
          {{- toYaml . | nindent 10 }}
        {{- end }}
      spec:
        accessModes:
          {{- toYaml .Values.persistence.accessModes | nindent 10 }}
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size | quote }}
  {{- end }}

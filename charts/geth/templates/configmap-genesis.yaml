{{- if and .Values.genesis.enabled (not .Values.genesis.existingConfigMap) }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "geth.fullname" . }}-genesis
  labels:
    {{- include "geth.labels" . | nindent 4 }}
data:
  genesis.json: |
    {{- .Values.genesis.config | toJson | nindent 4 }}
{{- end }}

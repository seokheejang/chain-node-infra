image:
  # -- Genesis generator image repository
  repository: ethpandaops/ethereum-genesis-generator
  # -- Genesis generator image tag
  tag: "5.3.5"
  # -- Image pull policy
  pullPolicy: IfNotPresent

# -- HTTP server port for serving genesis artifacts
serverPort: 8000

# -- Chain configuration passed as values.env to the generator.
# The image's built-in CL config.yaml template uses envsubst to substitute these values.
# See all available vars: https://github.com/ethpandaops/ethereum-genesis-generator
chainConfig:
  CHAIN_ID: "3238200"
  DEPOSIT_CONTRACT_ADDRESS: "0x4242424242424242424242424242424242424242"
  # -- Shared mnemonic for EL premine and CL validators (must match mnemonics[0].mnemonic)
  EL_AND_CL_MNEMONIC: "test test test test test test test test test test test junk"
  # -- Number of EOA addresses to derive from mnemonic via BIP-44 (m/44'/60'/0'/0/x)
  EL_PREMINE_COUNT: "30"
  # -- Balance per premined EOA account
  EL_PREMINE_BALANCE: "1000000000ETH"
  # -- Additional static premine addresses (JSON). Empty when using mnemonic-based premine.
  EL_PREMINE_ADDRS: '{}'
  PRESET_BASE: "mainnet"
  NUMBER_OF_VALIDATORS: "1"
  GENESIS_DELAY: "0"
  # -- Genesis timestamp (auto-set to deploy time by the template)
  GENESIS_TIMESTAMP: "0"
  SLOT_DURATION_IN_SECONDS: "12"
  MIN_GENESIS_ACTIVE_VALIDATOR_COUNT: "1"
  ALTAIR_FORK_EPOCH: "0"
  BELLATRIX_FORK_EPOCH: "0"
  CAPELLA_FORK_EPOCH: "0"
  # -- EL gas limit per block
  GENESIS_GASLIMIT: "60000000"
  # -- Terminal total difficulty (0 = PoS from genesis)
  TERMINAL_TOTAL_DIFFICULTY: "0"
  DENEB_FORK_EPOCH: "0"
  ELECTRA_FORK_EPOCH: "0"
  FULU_FORK_EPOCH: "18446744073709551615"

# -- Validator mnemonics for genesis generation (must match chainConfig.EL_AND_CL_MNEMONIC)
mnemonics:
  - mnemonic: "test test test test test test test test test test test junk"
    count: 1

serviceAccount:
  # -- Create a ServiceAccount
  create: true
  # -- ServiceAccount name (auto-generated if empty)
  name: ""
  # -- Annotations for the ServiceAccount
  annotations: {}

persistence:
  # -- Enable persistent storage for genesis data
  enabled: true
  # -- Storage class (empty for default)
  storageClass: ""
  # -- Volume size
  size: 1Gi

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

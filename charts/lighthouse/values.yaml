# -- Number of replicas
replicaCount: 1

image:
  # -- Container image repository
  repository: sigp/lighthouse
  # -- Container image tag
  tag: "v8.1.3"
  # -- Image pull policy
  pullPolicy: IfNotPresent

# -- Override the chart name
nameOverride: ""
# -- Override the full resource name
fullnameOverride: ""

serviceAccount:
  # -- Create a ServiceAccount
  create: true
  # -- ServiceAccount name (auto-generated if empty)
  name: ""
  # -- Annotations to add to the ServiceAccount
  annotations: {}

service:
  # -- Service type
  type: ClusterIP
  ports:
    # -- Beacon API HTTP port
    http: 5052
    # -- P2P TCP port
    p2pTcp: 9000
    # -- P2P UDP port
    p2pUdp: 9000
    # -- Metrics port
    metrics: 5054

persistence:
  # -- Enable persistent storage for beacon data
  enabled: true
  # -- Storage class (empty for default)
  storageClass: ""
  # -- Access modes
  accessModes:
    - ReadWriteOnce
  # -- Volume size
  size: 50Gi
  # -- Annotations for the PVC
  annotations: {}

resources:
  requests:
    # -- CPU request
    cpu: "1"
    # -- Memory request
    memory: 2Gi
  limits:
    # -- CPU limit
    cpu: "2"
    # -- Memory limit
    memory: 4Gi

# -- Node selector for pod scheduling
nodeSelector: {}

# -- Tolerations for pod scheduling
tolerations: []

# -- Affinity rules for pod scheduling
affinity: {}

# -- Pod security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

# -- Container security context
securityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false

config:
  # -- Ethereum network (mainnet, sepolia, holesky, private)
  # When set to "private", --testnet-dir and --private flags are used
  network: mainnet
  # -- Data directory inside the container
  dataDir: /data/lighthouse
  # -- Execution layer Engine API endpoint URL
  executionEndpoint: "http://geth:8551"
  # -- Number of slots per restore point (controls disk usage)
  slotsPerRestorePoint: 8192
  # -- Additional CLI arguments
  extraArgs: []

# -- Custom testnet directory configuration (for private/custom networks)
testnetDir:
  # -- Enable custom testnet directory
  enabled: false
  # -- CL config.yaml content (as YAML)
  # Example for private PoS network:
  #   PRESET_BASE: mainnet
  #   MIN_GENESIS_ACTIVE_VALIDATOR_COUNT: 1
  #   MIN_GENESIS_TIME: 0
  #   GENESIS_DELAY: 0
  #   SECONDS_PER_SLOT: 12
  config: {}
  # -- Execution block number at which the beacon chain was deployed
  deployBlock: "0"
  # -- Validator mnemonics for genesis generation (as YAML list)
  # Example:
  #   - mnemonic: "test test test test test test test test test test test junk"
  #     count: 1
  mnemonics: []
  # -- Use existing ConfigMap for testnet-dir files
  existingConfigMap: ""

# -- Genesis SSZ generator InitContainer configuration
genesisGenerator:
  # -- Enable InitContainer to auto-generate genesis.ssz
  enabled: false
  # -- Generator image repository
  image: ethpandaops/ethereum-genesis-generator
  # -- Generator image tag
  tag: "v5.3.5"
  # -- Name of the geth genesis ConfigMap to reference for EL genesis
  elGenesisConfigMap: ""

jwt:
  # -- Enable JWT authentication (required for Engine API)
  enabled: false
  # -- JWT secret value (generate with: openssl rand -hex 32)
  secret: ""
  # -- Use existing secret for JWT (shared with EL)
  existingSecret: ""

livenessProbe:
  # -- Enable liveness probe
  enabled: true
  # -- Initial delay before probe starts
  initialDelaySeconds: 60
  # -- Probe interval
  periodSeconds: 30
  # -- Probe timeout
  timeoutSeconds: 5
  # -- Failure threshold
  failureThreshold: 3
  httpGet:
    path: /lighthouse/health
    port: http

readinessProbe:
  # -- Enable readiness probe
  enabled: true
  # -- Initial delay before probe starts
  initialDelaySeconds: 30
  # -- Probe interval
  periodSeconds: 10
  # -- Probe timeout
  timeoutSeconds: 5
  # -- Failure threshold
  failureThreshold: 3
  httpGet:
    path: /lighthouse/health
    port: http

ingress:
  # -- Ingress type: "none", "ingress", or "httpRoute"
  type: none
  # -- Hostnames for ingress/httpRoute
  hostnames: []
  # -- Traditional Kubernetes Ingress configuration
  ingress:
    # -- Ingress class name (e.g., nginx)
    className: ""
    # -- Annotations for Ingress resource
    annotations: {}
    # -- TLS configuration
    tls: []
    #  - secretName: lighthouse-tls
    #    hosts:
    #      - lighthouse-api.example.com
  # -- Gateway API HTTPRoute configuration (e.g., Cilium Gateway)
  httpRoute:
    # -- Name of the parent Gateway resource
    gatewayName: ""
    # -- Namespace of the parent Gateway resource
    gatewayNamespace: default
    # -- Path match type (PathPrefix or Exact)
    pathType: PathPrefix
    # -- Path to match
    path: /

metrics:
  # -- Enable Prometheus metrics
  enabled: false
  serviceMonitor:
    # -- Create a ServiceMonitor resource
    enabled: false
    # -- ServiceMonitor scrape interval
    interval: 30s
    # -- Additional labels for the ServiceMonitor
    additionalLabels: {}

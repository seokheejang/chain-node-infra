# Values for chart-testing (ct lint / ct install) in Kind cluster.
# Uses mainnet mode without execution layer (lighthouse retries EL connection).
replicaCount: 1

config:
  network: mainnet
  dataDir: /data/lighthouse
  executionEndpoint: "http://localhost:8551"

jwt:
  enabled: false

persistence:
  enabled: true
  size: 1Gi

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

livenessProbe:
  enabled: true
  initialDelaySeconds: 30
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 10
  httpGet:
    path: /lighthouse/health
    port: http

readinessProbe:
  enabled: true
  initialDelaySeconds: 15
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 10
  httpGet:
    path: /lighthouse/health
    port: http

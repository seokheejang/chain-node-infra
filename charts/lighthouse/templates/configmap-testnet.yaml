{{- if and .Values.testnetDir.enabled (not .Values.testnetDir.existingConfigMap) }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "lighthouse.fullname" . }}-testnet
  labels:
    {{- include "lighthouse.labels" . | nindent 4 }}
data:
  config.yaml: |
    {{- .Values.testnetDir.config | toYaml | nindent 4 }}
  deploy_block: {{ .Values.testnetDir.deployBlock | quote }}
{{- end }}

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "lighthouse.fullname" . }}
  labels:
    {{- include "lighthouse.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  serviceName: {{ include "lighthouse.fullname" . }}
  selector:
    matchLabels:
      {{- include "lighthouse.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "lighthouse.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "lighthouse.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.genesisGenerator.enabled }}
      initContainers:
        - name: generate-genesis-ssz
          image: "{{ .Values.genesisGenerator.image }}:{{ .Values.genesisGenerator.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
          command:
            - sh
            - -c
            - |
              if [ -f /data/testnet/genesis.ssz ]; then
                echo "genesis.ssz already exists, skipping generation."
                exit 0
              fi
              mkdir -p /data/testnet
              echo "Generating genesis.ssz from EL genesis and CL config..."
              cp /config/testnet/config.yaml /data/testnet/config.yaml
              cp /config/testnet/deploy_block /data/testnet/deploy_block
              eth2-testnet-genesis bellatrix \
                --config /config/testnet/config.yaml \
                --mnemonics /config/testnet/mnemonics.yaml \
                --el-config /config/el-genesis/genesis.json \
                --state-output /data/testnet/genesis.ssz
              echo "genesis.ssz generated successfully."
          volumeMounts:
            - name: testnet-generated
              mountPath: /data/testnet
            {{- if .Values.genesisGenerator.elGenesisConfigMap }}
            - name: el-genesis
              mountPath: /config/el-genesis
              readOnly: true
            {{- end }}
            - name: testnet-config
              mountPath: /config/testnet
              readOnly: true
      {{- end }}
      containers:
        - name: lighthouse
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          args:
            - beacon_node
            {{- if ne .Values.config.network "private" }}
            - --network={{ .Values.config.network }}
            {{- end }}
            {{- if or .Values.testnetDir.enabled .Values.genesisGenerator.enabled }}
            {{- if .Values.genesisGenerator.enabled }}
            - --testnet-dir=/data/testnet
            {{- else }}
            - --testnet-dir=/config/testnet
            {{- end }}
            {{- end }}
            - --datadir={{ .Values.config.dataDir }}
            - --execution-endpoint={{ .Values.config.executionEndpoint }}
            {{- if .Values.jwt.enabled }}
            - --execution-jwt=/secrets/jwt/jwt.hex
            {{- end }}
            - --http
            - --http-address=0.0.0.0
            - --http-port={{ .Values.service.ports.http }}
            - --http-allow-origin=*
            - --port={{ .Values.service.ports.p2pTcp }}
            - --slots-per-restore-point={{ .Values.config.slotsPerRestorePoint }}
            {{- if .Values.metrics.enabled }}
            - --metrics
            - --metrics-address=0.0.0.0
            - --metrics-port={{ .Values.service.ports.metrics }}
            {{- end }}
            {{- if eq .Values.config.network "private" }}
            - --private
            {{- end }}
            {{- range .Values.config.extraArgs }}
            - {{ . }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.service.ports.http }}
              protocol: TCP
            - name: p2p-tcp
              containerPort: {{ .Values.service.ports.p2pTcp }}
              protocol: TCP
            - name: p2p-udp
              containerPort: {{ .Values.service.ports.p2pUdp }}
              protocol: UDP
            {{- if .Values.metrics.enabled }}
            - name: metrics
              containerPort: {{ .Values.service.ports.metrics }}
              protocol: TCP
            {{- end }}
          {{- if .Values.livenessProbe.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.livenessProbe.httpGet.path }}
              port: {{ .Values.livenessProbe.httpGet.port }}
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.livenessProbe.failureThreshold }}
          {{- end }}
          {{- if .Values.readinessProbe.enabled }}
          readinessProbe:
            httpGet:
              path: {{ .Values.readinessProbe.httpGet.path }}
              port: {{ .Values.readinessProbe.httpGet.port }}
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.readinessProbe.failureThreshold }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.config.dataDir }}
            {{- if .Values.jwt.enabled }}
            - name: jwt
              mountPath: /secrets/jwt
              readOnly: true
            {{- end }}
            {{- if .Values.genesisGenerator.enabled }}
            - name: testnet-generated
              mountPath: /data/testnet
              readOnly: true
            {{- else if .Values.testnetDir.enabled }}
            - name: testnet-config
              mountPath: /config/testnet
              readOnly: true
            {{- end }}
      {{- if or .Values.jwt.enabled .Values.testnetDir.enabled .Values.genesisGenerator.enabled }}
      volumes:
        {{- if .Values.jwt.enabled }}
        - name: jwt
          secret:
            {{- if .Values.jwt.existingSecret }}
            secretName: {{ .Values.jwt.existingSecret }}
            {{- else }}
            secretName: {{ include "lighthouse.fullname" . }}-jwt
            {{- end }}
        {{- end }}
        {{- if or .Values.testnetDir.enabled .Values.genesisGenerator.enabled }}
        - name: testnet-config
          configMap:
            {{- if .Values.testnetDir.existingConfigMap }}
            name: {{ .Values.testnetDir.existingConfigMap }}
            {{- else }}
            name: {{ include "lighthouse.fullname" . }}-testnet
            {{- end }}
        {{- end }}
        {{- if .Values.genesisGenerator.enabled }}
        - name: testnet-generated
          emptyDir: {}
        {{- if .Values.genesisGenerator.elGenesisConfigMap }}
        - name: el-genesis
          configMap:
            name: {{ .Values.genesisGenerator.elGenesisConfigMap }}
        {{- end }}
        {{- end }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- if .Values.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
        {{- with .Values.persistence.annotations }}
        annotations:
          {{- toYaml . | nindent 10 }}
        {{- end }}
      spec:
        accessModes:
          {{- toYaml .Values.persistence.accessModes | nindent 10 }}
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size | quote }}
  {{- end }}

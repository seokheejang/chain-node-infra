apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "lighthouse.fullname" . }}
  labels:
    {{- include "lighthouse.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  serviceName: {{ include "lighthouse.fullname" . }}
  selector:
    matchLabels:
      {{- include "lighthouse.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "lighthouse.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "lighthouse.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if and .Values.testnetDir.enabled .Values.testnetDir.fromUrls.genesisSsz }}
      initContainers:
        - name: download-testnet
          image: busybox:1.37
          command:
            - sh
            - -c
            - |
              echo "Waiting for genesis-generator..."
              until wget -q --spider {{ .Values.testnetDir.fromUrls.configYaml }}; do
                sleep 5
              done
              mkdir -p /testnet-download
              wget -O /testnet-download/genesis.ssz {{ .Values.testnetDir.fromUrls.genesisSsz }}
              wget -O /testnet-download/config.yaml {{ .Values.testnetDir.fromUrls.configYaml }}
              echo "0" > /testnet-download/deploy_block
              echo "0" > /testnet-download/deposit_contract_block.txt
              echo "Testnet files downloaded."
          volumeMounts:
            - name: testnet-download
              mountPath: /testnet-download
      {{- end }}
      containers:
        - name: lighthouse
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          command:
            - lighthouse
          args:
            - beacon_node
            {{- if ne .Values.config.network "private" }}
            - --network={{ .Values.config.network }}
            {{- end }}
            {{- if .Values.testnetDir.enabled }}
            {{- if .Values.testnetDir.fromUrls.genesisSsz }}
            - --testnet-dir=/testnet-download
            {{- else }}
            - --testnet-dir=/config/testnet
            {{- end }}
            {{- end }}
            - --datadir={{ .Values.config.dataDir }}
            - --execution-endpoint={{ .Values.config.executionEndpoint }}
            {{- if .Values.jwt.enabled }}
            - --execution-jwt=/secrets/jwt/jwt.hex
            {{- end }}
            - --http
            - --http-address=0.0.0.0
            - --http-port={{ .Values.service.ports.http }}
            - --http-allow-origin=*
            - --port={{ .Values.service.ports.p2pTcp }}
            - --slots-per-restore-point={{ .Values.config.slotsPerRestorePoint }}
            {{- if .Values.config.archiveMode }}
            - --reconstruct-historic-states
            {{- end }}
            {{- if .Values.metrics.enabled }}
            - --metrics
            - --metrics-address=0.0.0.0
            - --metrics-port={{ .Values.service.ports.metrics }}
            {{- end }}
            {{- if eq .Values.config.network "private" }}
            - --private
            {{- end }}
            {{- range .Values.config.extraArgs }}
            - {{ . }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.service.ports.http }}
              protocol: TCP
            - name: p2p-tcp
              containerPort: {{ .Values.service.ports.p2pTcp }}
              protocol: TCP
            - name: p2p-udp
              containerPort: {{ .Values.service.ports.p2pUdp }}
              protocol: UDP
            {{- if .Values.metrics.enabled }}
            - name: metrics
              containerPort: {{ .Values.service.ports.metrics }}
              protocol: TCP
            {{- end }}
          {{- if .Values.livenessProbe.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.livenessProbe.httpGet.path }}
              port: {{ .Values.livenessProbe.httpGet.port }}
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.livenessProbe.failureThreshold }}
          {{- end }}
          {{- if .Values.readinessProbe.enabled }}
          readinessProbe:
            httpGet:
              path: {{ .Values.readinessProbe.httpGet.path }}
              port: {{ .Values.readinessProbe.httpGet.port }}
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.readinessProbe.failureThreshold }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.config.dataDir }}
            {{- if .Values.jwt.enabled }}
            - name: jwt
              mountPath: /secrets/jwt
              readOnly: true
            {{- end }}
            {{- if and .Values.testnetDir.enabled .Values.testnetDir.fromUrls.genesisSsz }}
            - name: testnet-download
              mountPath: /testnet-download
              readOnly: true
            {{- else if .Values.testnetDir.enabled }}
            - name: testnet
              mountPath: /config/testnet
              readOnly: true
            {{- end }}
      {{- if or .Values.jwt.enabled .Values.testnetDir.enabled }}
      volumes:
        {{- if .Values.jwt.enabled }}
        - name: jwt
          secret:
            {{- if .Values.jwt.existingSecret }}
            secretName: {{ .Values.jwt.existingSecret }}
            {{- else }}
            secretName: {{ include "lighthouse.fullname" . }}-jwt
            {{- end }}
        {{- end }}
        {{- if and .Values.testnetDir.enabled .Values.testnetDir.fromUrls.genesisSsz }}
        - name: testnet-download
          emptyDir: {}
        {{- else if .Values.testnetDir.enabled }}
        - name: testnet
          configMap:
            {{- if .Values.testnetDir.existingConfigMap }}
            name: {{ .Values.testnetDir.existingConfigMap }}
            {{- else }}
            name: {{ include "lighthouse.fullname" . }}-testnet
            {{- end }}
        {{- end }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- if .Values.persistence.enabled }}
  volumeClaimTemplates:
    # apiVersion/kind 명시 — k8s API 가 apply 시 이 값들을 자동 채우므로
    # template 에도 박아두어 GitOps tool (ArgoCD/FluxCD) 의 drift detection 예방.
    - apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: data
        {{- with .Values.persistence.annotations }}
        annotations:
          {{- toYaml . | nindent 10 }}
        {{- end }}
      spec:
        accessModes:
          {{- toYaml .Values.persistence.accessModes | nindent 10 }}
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size | quote }}
  {{- end }}

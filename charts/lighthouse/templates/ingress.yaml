{{- if eq .Values.ingress.type "ingress" }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "lighthouse.fullname" . }}
  labels:
    {{- include "lighthouse.labels" . | nindent 4 }}
  {{- with .Values.ingress.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.ingress.className }}
  ingressClassName: {{ .Values.ingress.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.ingress.tls }}
  tls:
    {{- toYaml .Values.ingress.ingress.tls | nindent 4 }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hostnames }}
    {{- if kindIs "string" . }}
    - host: {{ . | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "lighthouse.fullname" $ }}
                port:
                  number: {{ $.Values.service.ports.http }}
    {{- else }}
    - host: {{ .hostname | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "lighthouse.fullname" $ }}
                port:
                  number: {{ index $.Values.service.ports .port }}
    {{- end }}
    {{- end }}
{{- end }}

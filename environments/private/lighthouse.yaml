# Private network (devnet) values for lighthouse.
# Genesis downloaded from genesis-generator HTTP server.
replicaCount: 1

config:
  network: private
  dataDir: /data/lighthouse
  executionEndpoint: "http://geth-private:8551"

testnetDir:
  enabled: true
  fromUrls:
    genesisSsz: "http://genesis-generator-private-genesis-generator:8000/metadata/genesis.ssz"
    configYaml: "http://genesis-generator-private-genesis-generator:8000/metadata/config.yaml"

jwt:
  enabled: true
  existingSecret: ethereum-jwt

persistence:
  enabled: true
  size: 20Gi

resources:
  requests:
    cpu: "1"
    memory: 1Gi
  limits:
    cpu: "2"
    memory: 2Gi

metrics:
  enabled: true

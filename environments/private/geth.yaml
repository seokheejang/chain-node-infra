# Private network (devnet) values for geth.
# Genesis downloaded from genesis-generator HTTP server.
replicaCount: 1

config:
  network: private
  networkId: "3238200"
  syncMode: full
  gcMode: full
  cache: 512
  maxPeers: 10
  httpApi: "eth,net,web3,debug,txpool,admin"
  wsApi: "eth,net,web3,debug,txpool"
  httpCorsDomain: "*"
  extraArgs:
    - --rpc.txfeecap=0
    - --rpc.evmtimeout=0

genesis:
  enabled: true
  fromUrl: "http://genesis-generator-private-genesis-generator:8000/metadata/genesis.json"

jwt:
  enabled: true
  existingSecret: ethereum-jwt

persistence:
  enabled: true
  size: 50Gi

resources:
  requests:
    cpu: "1"
    memory: 2Gi
  limits:
    cpu: "2"
    memory: 4Gi

# Private network (devnet) values for geth.
# Genesis downloaded from genesis-generator HTTP server.
replicaCount: 1

config:
  network: private
  networkId: 32382
  syncMode: full
  gcMode: full
  cache: 512
  maxPeers: 10

genesis:
  enabled: true
  fromUrl: "http://genesis-generator-private-genesis-generator:8000/metadata/genesis.json"

jwt:
  enabled: true
  existingSecret: ethereum-jwt

persistence:
  enabled: true
  size: 50Gi

resources:
  requests:
    cpu: "1"
    memory: 2Gi
  limits:
    cpu: "2"
    memory: 4Gi

# Sepolia testnet values for geth
replicaCount: 1

config:
  network: sepolia
  syncMode: snap
  gcMode: full    # "archive" for full historical state (~800Gi disk)
  cache: 2048

persistence:
  enabled: true
  size: 200Gi     # Increase to 800Gi for archive mode

resources:
  requests:
    cpu: "1"
    memory: 4Gi
  limits:
    cpu: "2"
    memory: 8Gi

metrics:
  enabled: true

# Baremetal ingress example (nip.io convention)

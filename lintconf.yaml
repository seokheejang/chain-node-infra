---
rules:
  braces:
    min-spaces-inside: 0
    max-spaces-inside: 0
  brackets:
    min-spaces-inside: 0
    max-spaces-inside: 0
  colons:
    max-spaces-after: -1
    max-spaces-before: 0
  commas:
    max-spaces-after: -1
    max-spaces-before: 0
  comments:
    min-spaces-from-content: 1
  document-end: disable
  document-start: disable
  empty-lines:
    max: 2
    max-end: 0
    max-start: 0
  indentation:
    indent-sequences: whatever
    spaces: 2
  key-duplicates: enable
  line-length: disable
  new-line-at-end-of-file: enable
  new-lines:
    type: unix
  trailing-spaces: enable
  truthy:
    level: warning

name: Release Charts

# Tag-triggered Helm chart publishing to GHCR (OCI).
#
# Trigger: push a per-chart semver tag like `geth-0.1.1` or `lighthouse-0.2.0`.
# The workflow packages all charts under charts/* and pushes any whose version
# is not yet on GHCR. Idempotent: existing versions are skipped.
#
# Tag convention: `<chart-name>-<semver>`
# Example: `git tag geth-0.1.1 && git push origin geth-0.1.1`

on:
  push:
    tags:
      - '*-[0-9]+.[0-9]+.[0-9]+'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      packages: write           # GHCR push
      id-token: write           # Sigstore OIDC keyless signing (Cosign)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Validate tag matches Chart.yaml version
        run: |
          tag="${GITHUB_REF#refs/tags/}"           # e.g. geth-0.1.1
          chart_name="${tag%-*}"
          tag_version="${tag##*-}"
          chart_yaml="charts/${chart_name}/Chart.yaml"
          if [ ! -f "$chart_yaml" ]; then
            echo "ERROR: chart not found: $chart_yaml (parsed from tag '$tag')"
            exit 1
          fi
          chart_version=$(grep '^version:' "$chart_yaml" | awk '{print $2}' | tr -d '"')
          if [ "$tag_version" != "$chart_version" ]; then
            echo "ERROR: tag version ($tag_version) != Chart.yaml version ($chart_version) for $chart_name"
            exit 1
          fi
          echo "OK: $chart_name @ $chart_version"

      # Use docker/login-action so credentials land in ~/.docker/config.json,
      # which BOTH helm v3 (OCI fallback) and cosign read. `helm registry login`
      # alone writes to a helm-private store that cosign cannot see, causing
      # signature upload to fail with UNAUTHORIZED.
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Package, push and sign charts
        env:
          OCI_REPO: oci://ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}
          OCI_REPO_BARE: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}
        run: |
          set -euo pipefail
          mkdir -p .release-packages
          for chart in charts/*/; do
            echo "::group::Packaging $chart"
            helm dependency update "$chart"
            helm package "$chart" -d .release-packages
            echo "::endgroup::"
          done
          for tgz in .release-packages/*.tgz; do
            name=$(basename "$tgz" .tgz)         # e.g. geth-0.1.1
            chart_name="${name%-*}"
            version="${name##*-}"
            # Idempotency: skip if version already exists on GHCR.
            # First release naturally 404s and falls through to push.
            if helm show chart "${OCI_REPO}/${chart_name}" --version "${version}" >/dev/null 2>&1; then
              echo "skip: ${chart_name}@${version} already published"
              continue
            fi
            echo "::group::push+sign ${chart_name}@${version}"
            # Capture push output to extract immutable digest for signing.
            # helm push writes "Pushed: ..." and "Digest: sha256:..." to stderr.
            helm push "$tgz" "$OCI_REPO" 2>&1 | tee push-output.txt
            digest=$(awk '/Digest: /{print $2}' push-output.txt)
            if [ -z "$digest" ]; then
              echo "ERROR: failed to parse digest from helm push output"
              cat push-output.txt
              exit 1
            fi
            # Cosign keyless signing via GitHub Actions OIDC.
            # No keys to manage - identity is the workflow itself.
            echo "Signing ${OCI_REPO_BARE}/${chart_name}@${digest}"
            cosign sign --yes "${OCI_REPO_BARE}/${chart_name}@${digest}"
            rm -f push-output.txt
            echo "::endgroup::"
          done
